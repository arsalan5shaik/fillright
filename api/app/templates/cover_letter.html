<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  @page { size: letter; margin: 0.85in; }
  body { font-family: Helvetica, Arial, sans-serif; font-size: 11pt; color: #111; line-height: 1.45; }
  .header { margin-bottom: 18px; }
  .header .name { font-size: 13pt; font-weight: bold; }
  .contact-line { font-size: 9.5pt; color: #333; }
  .date { margin: 12px 0 18px; }
  p { margin: 0 0 12px; }
</style>
</head>
<body>
  <div class="header">
    <div class="name">{{ contact.full_name or "" }}</div>
    <div class="contact-line">
      {{ [contact.email, contact.phone, contact.linkedin_url] | select | join(' | ') }}
    </div>
  </div>
  <div class="date">{{ date }}</div>
  {% for paragraph in paragraphs %}
  <p>{{ paragraph }}</p>
  {% endfor %}
</body>
</html>
